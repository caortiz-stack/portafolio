        /* === FONDO LÍQUIDO HOLOGRÁFICO (100% GPU) === */
        .holographic-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1; background: #000; overflow: hidden;
            pointer-events: none;
        }

        .liquid-aura {
            position: absolute; border-radius: 50%;
            filter: blur(100px); will-change: transform;
            opacity: 0.25; animation: liquidMove 25s infinite alternate ease-in-out;
            transform: translateZ(0);
        }

        .aura-1 { width: 60vw; height: 60vw; background: radial-gradient(circle, #00f2ff 0%, #7000ff 70%); top: -10%; left: -10%; }

        .aura-3 { width: 40vw; height: 40vw; background: radial-gradient(circle, #ffffff 0%, #00d4ff 70%); top: 30%; left: 30%; animation-delay: -10s; opacity: 0.15; }

        @keyframes liquidMove {
            0% { transform: translate3d(0, 0, 0) rotate(0deg) scale(1); }
            100% { transform: translate3d(100px, 50px, 0) rotate(90deg) scale(1.2); }
        }

        .film-grain {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;

            background: linear-gradient(180deg, #fff 60%, rgba(255,255,255,0.2) 100%);

        .co-ai-btn:hover { background: rgba(0, 242, 255, 0.15) !important; transform: translateY(-3px); }

    <!-- SCRIPT OPTIMIZADO -->
    <script>
        const apiKey = ""; 
        const aiBtn = document.getElementById('co-ai-enhance-btn');
        const textarea = document.getElementById('co-ai-textarea');
        const loading = document.getElementById('co-ai-loading');
        const heroTitle = document.getElementById('hero-title');

        // RequestAnimationFrame para un scroll cinematográfico sin caídas de FPS
        let isTicking = false;
        window.addEventListener('scroll', () => {
            if (!isTicking) {
                window.requestAnimationFrame(() => {
                    let value = window.scrollY;
                    let opacity = 1 - (value / 600);
                    let blur = value / 40;
                    
                    if (opacity >= 0) {
                        heroTitle.style.opacity = opacity;
                        heroTitle.style.transform = `translate3d(0, ${value * 0.25}px, 0) scale(${1 - (value * 0.0004)})`;
                        heroTitle.style.filter = `blur(${blur}px)`;
                    }
                    isTicking = false;
                });
                isTicking = true;
            }
        }, { passive: true });

        // Lógica de Asistente Gemini IA
        async function fetchGemini(prompt, retries = 5, delay = 1000) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { 
                    parts: [{ text: "Eres el Director Creativo Estratégico de Christian Ortiz. Transforma el brief del cliente en un documento profesional, detallado y lujoso. Mantén el idioma original." }] 
                }
            };

            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text;
                } catch (err) {
                    if (i === retries - 1) throw err;
                    await new Promise(r => setTimeout(r, delay));
                    delay *= 2;
                }
            }
        }

        aiBtn.addEventListener('click', async () => {
            const txt = textarea.value.trim();
            if (txt.length < 5) return;
            aiBtn.disabled = true;
            loading.style.display = 'flex';
            try {
                const res = await fetchGemini(`Profesionaliza este brief para un artista visual: ${txt}`);
                if (res) textarea.value = res;
            } catch (e) { console.error(e); }
            finally { aiBtn.disabled = false; loading.style.display = 'none'; }
        });
    </script>
