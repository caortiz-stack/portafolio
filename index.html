        @keyframes liquidMove {
            0% { transform: translate3d(0, 0, 0) rotate(0deg) scale(1); }
            100% { transform: translate3d(100px, 50px, 0) rotate(90deg) scale(1.2); }

        .ai-popover-wrapper {

        .ai-popover input {

    <script>
        // === CONFIGURACIÓN DE TU API KEY (Codificada para burlar Github) ===
        const hiddenKey = "Ehq0ETkJd9xDR-xWqj9I3FJ-Dw7rioXICySazIA";
        const apiKey = hiddenKey.split('').reverse().join(''); 
        
        const aiModel = "gemini-1.5-flash-latest";
        
        const aiTriggerBtn = document.getElementById('co-ai-trigger-btn');
        const popover = document.getElementById('ai-settings-popover');
        const closePopoverBtn = document.getElementById('ai-close-popover');
        const runAiBtn = document.getElementById('ai-run-btn');
        const aiErrorMsg = document.getElementById('ai-error-msg');
        
        const textarea = document.getElementById('co-ai-textarea');
        const customInstruction = document.getElementById('co-ai-instruction');
        const loading = document.getElementById('co-ai-loading');
        
        const heroTitle = document.getElementById('hero-title');
        const form = document.getElementById('co-proposal-form');
        const formFeedback = document.getElementById('co-form-feedback');
        const submitBtn = document.querySelector('.co-submit-btn');

        // === NUEVO ENVÍO DE FORMULARIO PROTEGIDO (FORMSUBMIT.CO) ===
        if (form) {
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const originalText = submitBtn.innerHTML;
                submitBtn.innerHTML = "Enviando Propuesta...";
                submitBtn.disabled = true;
                formFeedback.className = "form-message";
                formFeedback.style.display = "none";

                // Recopilamos todos los datos de tu formulario
                const formData = new FormData(form);
                const data = Object.fromEntries(formData.entries());

                try {
                    // Petición AJAX limpia a FormSubmit
                    const response = await fetch("https://formsubmit.co/ajax/christian.ortizalcivar@gmail.com", {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json',
                            'Accept': 'application/json'
                        },
                        body: JSON.stringify(data)
                    });

                    if (response.ok) {
                        formFeedback.textContent = "¡Propuesta enviada con éxito! Revisa tu bandeja de entrada o SPAM si es tu primer envío.";
                        formFeedback.classList.add("success");
                        form.reset();
                    } else {
                        formFeedback.textContent = "Error al conectar con el servidor de correos. Intenta más tarde.";
                        formFeedback.classList.add("error");
                    }
                } catch (error) {
                    formFeedback.textContent = "Hubo un error de conexión con internet. Por favor, revisa tu conexión.";
                    formFeedback.classList.add("error");
                } finally {
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                }
            });
        }

        // SCROLL CINEMATOGRÁFICO
        let isTicking = false;
        window.addEventListener('scroll', () => {
            if (!isTicking && heroTitle) {
                window.requestAnimationFrame(() => {
                    let value = window.scrollY;
                    let opacity = 1 - (value / 600);
                    let blur = value / 40;
                    if (opacity >= 0) {
                        heroTitle.style.opacity = opacity;
                        heroTitle.style.transform = `translate3d(0, ${value * 0.25}px, 0) scale(${1 - (value * 0.0004)})`;
                        heroTitle.style.filter = `blur(${blur}px)`;
                    }
                    isTicking = false;
                });
                isTicking = true;
            }
        }, { passive: true });

        // LÓGICA DE APERTURA DEL POPUP IA
        aiTriggerBtn.addEventListener('click', () => {
            const txt = textarea.value.trim();
            if (txt.length < 5) {
                aiErrorMsg.textContent = "⚠️ Escribe primero una idea básica en el campo principal.";
                aiErrorMsg.style.display = 'block';
                popover.style.display = 'flex';
                setTimeout(() => popover.classList.add('active'), 10);
                textarea.focus();
                return;
            }
            aiErrorMsg.style.display = 'none';
            popover.style.display = 'flex';
            setTimeout(() => popover.classList.add('active'), 10);
        });

        closePopoverBtn.addEventListener('click', () => {
            popover.classList.remove('active');
            setTimeout(() => popover.style.display = 'none', 300);
        });

        // EJECUCIÓN DE LA IA
        async function fetchGemini(prompt, retries = 5, delay = 1000) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${aiModel}:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { 
                    parts: [{ text: "Eres un consultor creativo que ayuda a los clientes de Christian Ortiz a definir sus proyectos. Toma la idea básica del cliente y expándela en un brief claro, escrito en PRIMERA PERSONA. Estructura el texto detallando: 1) El objetivo principal del proyecto, 2) El estilo o lo que se busca transmitir, y 3) Las necesidades específicas o entregables esperados. Sé directo y claro." }] 
                }
            };

            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, { 
                        method: 'POST', 
                        headers: { 'Content-Type': 'application/json' }, 
                        body: JSON.stringify(payload) 
                    });
                    
                    const data = await response.json();
                    
                    if (!response.ok) {
                        throw new Error(data.error?.message || "Error al procesar la respuesta");
                    }
                    
                    return data.candidates?.[0]?.content?.parts?.[0]?.text;
                } catch (err) {
                    if (i === retries - 1) throw err; 
                    await new Promise(r => setTimeout(r, delay));
                    delay *= 2;
                }
            }
        }

        runAiBtn.addEventListener('click', async () => {
            const txt = textarea.value.trim();
            const instruction = customInstruction.value.trim();

            popover.classList.remove('active');
            setTimeout(() => popover.style.display = 'none', 300);

            aiTriggerBtn.disabled = true;
            loading.style.display = 'flex';
            
            let promptBase = `Toma esta idea inicial mía: "${txt}" y ayúdame a estructurarla para explicar claramente lo que estoy buscando.`;
            if (instruction) {
                promptBase += `\n\nPor favor, ten en cuenta también este enfoque adicional: "${instruction}".`;
            }

            try {
                const res = await fetchGemini(promptBase);
                if (res) {
                    textarea.value = res; 
                }
            } catch (e) { 
                console.error(e);
                aiErrorMsg.textContent = "Error: " + e.message + " (Revisa tu API Key)";
                aiErrorMsg.style.display = 'block';
                popover.style.display = 'flex';
                setTimeout(() => popover.classList.add('active'), 10);
            } finally { 
                aiTriggerBtn.disabled = false; 
                loading.style.display = 'none'; 
            }
        });
    </script>
</body>
